<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #1a1a2e;
      background: #f5f5f5;
    }
    header {
      text-align: center;
      padding: 100px 20px 60px;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
    }
    header h1 {
      font-size: 3rem;
      margin-bottom: 16px;
    }
    header p {
      font-size: 1.2rem;
      max-width: 600px;
      margin: 0 auto 32px;
      opacity: 0.85;
    }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: #e94560;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn:hover { background: #c73650; }
    footer {
      text-align: center;
      padding: 24px 20px;
      background: #1a1a2e;
      color: #aaa;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>OpenClaw</h1>
    <p>An open-source AI workspace for building, deploying, and managing intelligent agents — fast, flexible, and community-driven.</p>
    <a href="#" class="btn">Learn More</a>
  </header>
  <footer>
    &copy; 2026 OpenClaw. All rights reserved.
  </footer>
</body>
</html>
